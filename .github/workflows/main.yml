name: Sistema INVIMA Automatizado

on:
  schedule:
    # Jueves 4:00 PM Colombia - Enviar alertas (PRUEBA)
    - cron: '0 21 * * 4'
    # Jueves 5:00 PM Colombia - Procesar PDFs (PRUEBA)
    - cron: '0 22 * * 4'
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 21 * * 4' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Enviar emails con alertas
      env:
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > google-credentials.json
        python main.py

  procesar-pdfs:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 22 * * 4' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Procesar respuestas y enviar PDFs
      env:
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > google-credentials.json
        python enviar_pdf_respuestas.py
