name: Sistema INVIMA Automatizado

on:
  schedule:
    # HOY 3:00 PM Colombia - Enviar alertas prueba
    - cron: '0 20 * * 6'
    # HOY 3:30 PM Colombia - Procesar PDFs prueba
    - cron: '30 20 * * 6'
  workflow_dispatch:

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 20 * * 6' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Enviar emails con alertas
      env:
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > google-credentials.json
        python main.py

  procesar-pdfs:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '30 20 * * 6' ||
      github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Procesar respuestas y enviar PDFs
      env:
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > google-credentials.json
        python enviar_pdf_respuestas.py
